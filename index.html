<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventário Kids - DEAvila</title>
  
  <!-- Favicon -->
  <link rel="icon" href="public/favicon.ico" type="image/x-icon">

  <!-- Estilos -->
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <img src="public/logo.svg" alt="Logo Inventário Kids" class="logo">
    <h1>Inventário Kids</h1>
    <!-- 🔹 Botão Admin (invisível até login como admin) -->
    <button id="adminButton" style="display:none;">⚙️ Admin</button>
  </header>

  <main>
    <!-- Cadastro de Itens -->
    <section class="form-container">
      <h2>Cadastrar Novo Item</h2>
      <form id="itemForm">
        <input type="hidden" id="itemId">
        <div class="input-group">
          <label for="itemName">Item:</label>
          <input type="text" id="itemName" required>
        </div>
        <div class="input-group">
          <label for="itemQuantity">Quantidade:</label>
          <input type="number" id="itemQuantity" required min="0">
        </div>
        <div class="input-group">
          <label for="itemLocation">Local:</label>
          <input type="text" id="itemLocation" required>
        </div>
        <div class="input-group">
          <label for="itemPhoto">Foto:</label>
          <!-- no celular abre direto a câmera -->
          <input type="file" id="itemPhoto" accept="image/*" capture="environment">
        </div>
        <button type="submit" id="submitButton">Cadastrar</button>
      </form>
    </section>

    <!-- Lista e Busca -->
    <section class="list-container">
      <h2>Materiais Cadastrados</h2>
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="🔍 Buscar item...">
      </div>
      <div id="itemList" class="item-grid"></div>

      <!-- 🔹 Botão de Exportação -->
      <div class="export-bar">
        <button id="exportButton">📤 Exportar para Excel</button>
      </div>
    </section>
  </main>

  <!-- 🔹 Modal de Login -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span id="closeLoginModal" class="close">&times;</span>
      <h2>🔐 Login</h2>
      <form id="loginForm">
        <div class="input-group">
          <label for="loginEmail">E-mail:</label>
          <input type="email" id="loginEmail" required>
        </div>
        <div class="input-group">
          <label for="loginPassword">Senha:</label>
          <input type="password" id="loginPassword" required>
        </div>
        <div class="input-group checkbox">
          <label><input type="checkbox" id="rememberMe"> Manter conectado</label>
        </div>
        <button type="submit">Entrar</button>
      </form>
    </div>
  </div>

  <!-- 🔹 Modal Admin (convites e controle de usuários) -->
  <div id="adminModal" class="modal">
    <div class="modal-content">
      <span id="closeAdminModal" class="close">&times;</span>
      <h2>⚙️ Administração</h2>
      <form id="inviteForm">
        <div class="input-group">
          <label for="inviteEmail">Convidar por e-mail:</label>
          <input type="email" id="inviteEmail" required>
        </div>
        <button type="submit">Convidar</button>
      </form>
      <div id="userList"></div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
